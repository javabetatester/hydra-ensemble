name: CI

on:
  push:
    branches:
      - main
      - "multi-os/**"
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR / branch
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      # Pull repo at the triggering ref
      - name: Checkout
        uses: actions/checkout@v4

      # Node 20 LTS with built-in npm cache
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Linux needs build toolchain for node-pty native module
      - name: Install Linux build deps for node-pty
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ libx11-dev

      # Prefer reproducible npm ci; fall back if Phase 0 has no lockfile yet
      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json found, falling back to npm install"
            npm install
          fi

      # Rebuild node-pty against Electron's Node ABI
      - name: Rebuild native modules for Electron
        run: npm run rebuild

      # TypeScript project references typecheck
      - name: Typecheck
        run: npm run typecheck

      # Vitest unit tests
      - name: Test
        run: npm run test

      # electron-vite production build (no packaging here)
      - name: Build
        run: npm run build

  lint-pr-title:
    name: lint-pr-title
    runs-on: ubuntu-22.04
    # Only meaningful on PRs; safe no-op stub for now
    if: github.event_name == 'pull_request'
    steps:
      # TODO: wire up amannn/action-semantic-pull-request or similar
      - name: Stub PR title lint
        run: echo "PR title lint placeholder - implement before v1 release"
